# Reference template — copy into the target repo's .github/workflows/szumrak-worker.yml.
# Adjust: the "Checkout target repo" step name, AGENT_MODEL, and timeout-minutes
# to the target repo's own needs. "Checkout szumrak" always points at
# JanSzewczyk/szumrak — that's the engine, not the target repo.
name: Szumrak Worker 👷‍♂️

on:
  workflow_dispatch:
    inputs:
      task:
        description: "Natural-language task for the agent to perform"
        required: true
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  work:
    name: Work 🛠️
    # github.repository_owner, not a hardcoded username, so this template stays
    # correct for whichever account/org owns the target repo it's copied into —
    # every run costs real ANTHROPIC_API_KEY tokens, so a collaborator with
    # write access (but not the repo owner) triggering workflow_dispatch is
    # blocked before the job even starts, not just discouraged.
    if: github.event_name == 'workflow_dispatch' && github.actor == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Serializes runs against this repo — protects against two workflow_dispatch
    # triggers operating on the same checkout at once (branch conflicts, a race
    # on git push). Keyed per-repo rather than per-issue/PR (see Notion page 16)
    # because this workflow has no issue_comment trigger yet to key off of.
    concurrency:
      group: szumrak-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          path: workspace

      # Pre-install the target repo's deps into the mounted workspace so the
      # agent can run the repo's test/type-check scripts to self-verify, instead
      # of burning turns trying to `npm install` inside the container (the
      # mounted /workspace has no node_modules otherwise). Set node-version to
      # match the szumrak image (node:24-slim) so node_modules are ABI-compatible
      # with the node that runs the tests inside the container. Best-effort
      # (continue-on-error) so a non-npm target repo or an install hiccup never
      # blocks PR creation — the agent just falls back to not self-verifying.
      # Adjust or remove these two steps if your target repo isn't npm-based.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: workspace/package-lock.json

      - name: Install target repo dependencies
        working-directory: workspace
        continue-on-error: true
        run: npm ci

      - name: Checkout szumrak
        uses: actions/checkout@v7
        with:
          repository: JanSzewczyk/szumrak
          path: szumrak-src

      - name: Build Szumrak image
        run: docker build -t szumrak -f szumrak-src/docker/Dockerfile szumrak-src

      - name: Run Szumrak
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          TASK: ${{ github.event.inputs.task }}
          REPO: ${{ github.repository }}
          AGENT_MODEL: haiku
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY -e GH_APP_ID -e GH_APP_PRIVATE_KEY -e GH_APP_INSTALLATION_ID \
            -e TASK -e REPO -e AGENT_MODEL \
            -e GITHUB_STEP_SUMMARY \
            -v ${{ github.workspace }}/workspace:/workspace \
            -v "$GITHUB_STEP_SUMMARY:$GITHUB_STEP_SUMMARY" \
            szumrak

      - name: Upload Szumrak log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: szumrak-log
          path: ${{ github.workspace }}/workspace/agent-run.jsonl
          if-no-files-found: ignore

  review-followup:
    name: Szumrak Review Follow-up
    # Only follow up on PRs Szumrak itself opened, and only for feedback from
    # an actual person — not another bot/Action reacting to the PR. Also skips
    # a pull_request_review with no body: submitting a review with only inline
    # comments (no overall summary) fires both pull_request_review_comment
    # (handled, has the actual feedback) and pull_request_review with an empty
    # body — without this guard the empty one runs too and fails on
    # "REVIEW_FEEDBACK required" for no reason.
    if: |
      github.event_name != 'workflow_dispatch' &&
      contains(github.event.pull_request.labels.*.name, 'ai-generated') &&
      github.event.sender.type == 'User' &&
      (github.event_name != 'pull_request_review' || github.event.review.body)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Same group as run-szumrak on purpose — a review follow-up and a fresh
    # manual run must not race on the same checkout.
    concurrency:
      group: szumrak-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          path: workspace

      # Pre-install the target repo's deps into the mounted workspace so the
      # agent can run the repo's test/type-check scripts to self-verify, instead
      # of burning turns trying to `npm install` inside the container (the
      # mounted /workspace has no node_modules otherwise). Set node-version to
      # match the szumrak image (node:24-slim) so node_modules are ABI-compatible
      # with the node that runs the tests inside the container. Best-effort
      # (continue-on-error) so a non-npm target repo or an install hiccup never
      # blocks PR creation — the agent just falls back to not self-verifying.
      # Adjust or remove these two steps if your target repo isn't npm-based.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: workspace/package-lock.json

      - name: Install target repo dependencies
        working-directory: workspace
        continue-on-error: true
        run: npm ci

      - name: Checkout szumrak
        uses: actions/checkout@v7
        with:
          repository: JanSzewczyk/szumrak
          path: szumrak-src

      - name: Build Szumrak image
        run: docker build -t szumrak -f szumrak-src/docker/Dockerfile szumrak-src

      - name: Run Szumrak (review follow-up)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          REPO: ${{ github.repository }}
          AGENT_MODEL: haiku
          MODE: review-followup
          PR_NUMBER: ${{ github.event.pull_request.number }}
          # Inline review comments (pull_request_review_comment) carry a
          # path/line the general review event doesn't have — keep that
          # location context in the feedback text when present, per Notion
          # page 9's recommendation over a flattened, location-less string.
          REVIEW_FEEDBACK: "${{ github.event_name == 'pull_request_review_comment' && format('On line {0} in {1}: {2}', github.event.comment.line, github.event.comment.path, github.event.comment.body) || github.event.review.body }}"
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY -e GH_APP_ID -e GH_APP_PRIVATE_KEY -e GH_APP_INSTALLATION_ID \
            -e REPO -e AGENT_MODEL -e MODE -e PR_NUMBER -e REVIEW_FEEDBACK \
            -e GITHUB_STEP_SUMMARY \
            -v ${{ github.workspace }}/workspace:/workspace \
            -v "$GITHUB_STEP_SUMMARY:$GITHUB_STEP_SUMMARY" \
            szumrak

      - name: Upload Szumrak log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: szumrak-review-followup-log
          path: ${{ github.workspace }}/workspace/agent-run.jsonl
          if-no-files-found: ignore
