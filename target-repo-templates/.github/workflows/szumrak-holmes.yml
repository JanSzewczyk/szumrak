# Reference template — copy into the target repo's .github/workflows/szumrak-holmes.yml.
# Adjust: the `if:` guard and `agent_model`/`timeout_minutes` inputs to the target
# repo's own needs, same as szumrak-worker.yml. All of the actual run logic
# (checkout, engine ref resolution, Docker build/run, log upload) lives in the
# `_holmes.yml` reusable workflow hosted in JanSzewczyk/szumrak — this file only
# wires the `question` trigger to it.
#
# Version the `uses: .../@ref` below to `main` (default — logic-template fixes and
# improvements apply automatically on every run, no copy to update) or pin it to a
# release tag, e.g. `@v1.13.0` (deliberate, manual bumps — see README.md's
# "Target Repo Configuration" section). Note this is independent from
# `szumrakEngineVersion` in `.claude/agent-config.json`, which pins the Docker image
# built *inside* the reusable workflow, not the workflow YAML itself.
#
# Single-purpose workflow dedicated to MODE=ask: a `question` in, a read-only
# agent run, an answer in GITHUB_STEP_SUMMARY out — no `task` input, no
# mode-selection guard, no PR/branch/commit anywhere in this workflow. Kept
# separate from szumrak-worker.yml (runner/review-followup) on purpose: those two
# modes commit and push; this one never does, so it has nothing to serialize
# behind and no reason to share a job with them.
name: Szumrak Holmes 🕵️

on:
  workflow_dispatch:
    inputs:
      question:
        description: "Question for the agent to answer about this repository, read-only"
        required: true

# A called reusable workflow's own `permissions:` block is capped by whatever
# the caller grants here — keep this in sync with _holmes.yml's `permissions:`
# in JanSzewczyk/szumrak.
permissions:
  contents: read

jobs:
  run-szumrak-holmes:
    name: Run Szumrak Holmes
    # github.repository_owner, not a hardcoded username, so this template stays
    # correct for whichever account/org owns the target repo it's copied into —
    # every run costs real ANTHROPIC_API_KEY tokens, so a collaborator with
    # write access (but not the repo owner) triggering workflow_dispatch is
    # blocked before the job even starts, not just discouraged.
    if: github.actor == github.repository_owner
    uses: JanSzewczyk/szumrak/.github/workflows/_holmes.yml@main
    with:
      question: ${{ github.event.inputs.question }}
      agent_model: haiku
      timeout_minutes: 20
    secrets: inherit
