# Reference template — copy into the target repo's .github/workflows/szumrak-holmes.yml.
# Adjust: the "Checkout target repo" step name, AGENT_MODEL, and timeout-minutes
# to the target repo's own needs, same as szumrak.yml. "Checkout szumrak" always
# points at JanSzewczyk/szumrak — that's the engine, not the target repo.
#
# Single-purpose workflow dedicated to MODE=ask: a `question` in, a read-only
# agent run, an answer in GITHUB_STEP_SUMMARY out — no `task` input, no
# mode-selection guard, no PR/branch/commit anywhere in this workflow. Kept
# separate from szumrak.yml (runner/review-followup) on purpose: those two
# modes commit and push; this one never does, so it has nothing to serialize
# behind and no reason to share a job with them.
name: Szumrak Holmes 🕵️

on:
  workflow_dispatch:
    inputs:
      question:
        description: "Question for the agent to answer about this repository, read-only"
        required: true

permissions:
  contents: read

jobs:
  run-szumrak-holmes:
    name: Run Szumrak Holmes
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Own group, separate from szumrak.yml's `szumrak-${{ github.repository }}` —
    # an ask-mode run never commits/pushes, so it has nothing to race with a
    # runner/review-followup run over and no reason to queue behind one.
    concurrency:
      group: szumrak-holmes-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          path: workspace

      # Pre-install the target repo's deps into the mounted workspace so the
      # agent can run the repo's test/type-check scripts to self-verify, instead
      # of burning turns trying to `npm install` inside the container (the
      # mounted /workspace has no node_modules otherwise). Set node-version to
      # match the szumrak image (node:24-slim) so node_modules are ABI-compatible
      # with the node that runs the tests inside the container. Best-effort
      # (continue-on-error) so a non-npm target repo or an install hiccup never
      # blocks the answer — the agent just falls back to not self-verifying.
      # Adjust or remove these two steps if your target repo isn't npm-based.
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: workspace/package-lock.json

      - name: Install target repo dependencies
        working-directory: workspace
        continue-on-error: true
        run: npm ci

      - name: Checkout szumrak
        uses: actions/checkout@v7
        with:
          repository: JanSzewczyk/szumrak
          path: szumrak-src

      - name: Build Szumrak image
        run: docker build -t szumrak -f szumrak-src/docker/Dockerfile szumrak-src

      - name: Run Szumrak Holmes
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_APP_ID: ${{ secrets.GH_APP_ID }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
          GH_APP_INSTALLATION_ID: ${{ secrets.GH_APP_INSTALLATION_ID }}
          MODE: ask
          QUESTION: ${{ github.event.inputs.question }}
          REPO: ${{ github.repository }}
          AGENT_MODEL: haiku
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY -e GH_APP_ID -e GH_APP_PRIVATE_KEY -e GH_APP_INSTALLATION_ID \
            -e MODE -e QUESTION -e REPO -e AGENT_MODEL \
            -e GITHUB_STEP_SUMMARY \
            -v ${{ github.workspace }}/workspace:/workspace \
            -v "$GITHUB_STEP_SUMMARY:$GITHUB_STEP_SUMMARY" \
            szumrak

      - name: Upload Szumrak log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: szumrak-holmes-log
          path: ${{ github.workspace }}/workspace/agent-run.jsonl
          if-no-files-found: ignore
