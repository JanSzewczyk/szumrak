name: PR Checks ✅

on:
  pull_request:

env:
  NODE_VERSION: latest

permissions:
  pull-requests: write

jobs:
  build:
    name: Build 🏗️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies ⚙️
        run: npm ci
      - name: Build Check 🏗️
        run: npm run build
  #        env:
  #          SOME_SECRET: ${{ secret.SOME_SECRET }}

  biome:
    name: Biome 🌿
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Setup Biome 🌿
        uses: biomejs/setup-biome@v2
      - name: Biome Check 🌿
        run: npm run biome:ci

  type-check:
    name: TypeScript 🛠️
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install dependencies ⚙️
        run: npm ci
      - name: TypeScript Check 🛠️
        run: npm run typecheck

  test-unit:
    name: Test Unit 🧪
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install packages ⚙️
        run: npm ci
      - name: Run Unit Tests 🧪
        run: npx vitest run --project=unit --reporter=blob --coverage --outputFile=.vitest-reports/blob-unit.json
      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: blob-unit
          path: .vitest-reports/*
          retention-days: 1
          include-hidden-files: true

  report-coverage:
    name: Coverage Report 📊
    runs-on: ubuntu-latest
    needs: [test-unit]
    if: always()
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Set up Node.js 🟢
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - name: Install packages ⚙️
        run: npm ci
      - name: Download blob reports
        uses: actions/download-artifact@v8
        with:
          path: .vitest-reports
          pattern: blob-*
          merge-multiple: true
      - name: Merge reports & generate coverage
        run: npx vitest run --merge-reports=.vitest-reports --coverage
      - name: Report coverage to PR
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code 📚
        uses: actions/checkout@v6
      - name: Dependency Review
        uses: actions/dependency-review-action@v5
        with:
          comment-summary-in-pr: on-failure
